name: Daily job check

on:
  schedule:
    # 03:30 UTC = 09:00 IST, every day
    - cron: "30 3 * * *"
  workflow_dispatch: {}   # lets you trigger a manual run from the Actions tab

permissions:
  contents: write

jobs:
  check-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        run: python scraper/scrape_jobs.py

      - name: Send Telegram notification (if configured)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scraper/notify.py --data-dir docs/data --label "Equity/AM/IB tracker"

      - name: Commit updated data
        run: |
          git config user.name "job-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Daily job data update"
          git push
